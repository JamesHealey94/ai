<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEF Mockup</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; color: #333; }
        header { background: #003366; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .nav { background: #f4f4f4; padding: 0.5rem; display: flex; gap: 20px; justify-content: center; }
        .hero { background: #eee; padding: 4rem; text-align: center; }
        .container { max-width: 1200px; margin: auto; padding: 2rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 1rem; text-align: center; }
        footer { background: #333; color: white; padding: 2rem; text-align: center; margin-top: 2rem; }
    </style>
</head>
<body>

<header>
    <div><strong>CEF</strong> - Electrical Wholesale</div>
    <input type="text" placeholder="Search products...">
    <div>Account | Basket</div>
</header>

<div class="nav">
    <a href="#">Products</a>
    <a href="#">Branches</a>
    <a href="#">Services</a>
    <a href="#">Offers</a>
</div>

<div class="hero">
    <h1>Quality Electrical Supplies</h1>
    <p>Professional service for trade and industry.</p>
</div>

<div class="container">
    <h2>Featured Categories</h2>
    <div class="product-grid">
        <div class="card">Lighting</div>
        <div class="card">Wiring & Accessories</div>
        <div class="card">Heating & Ventilation</div>
        <div class="card">Cable & Management</div>
    </div>
</div>

<footer>
    &copy; 2026 CEF Mockup | All rights reserved.
</footer>

</body>
</html>
