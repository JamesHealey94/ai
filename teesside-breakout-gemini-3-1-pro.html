<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teesside Breakout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111827; /* Gray-900 */
            color: white;
            overflow: hidden;
            font-family: 'Press Start 2P', system-ui, sans-serif;
            touch-action: none; /* Prevent pull-to-refresh and scrolling on mobile */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #ui-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }

        canvas {
            display: block;
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 24, 39, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 1rem;
        }

        .btn {
            background-color: #DC2626; /* Boro Red */
            color: white;
            border: 4px solid #991B1B;
            padding: 1rem 2rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 2rem;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        /* Teesside accent colors for text */
        .text-boro { color: #DC2626; }
        .text-parmo { color: #F59E0B; }
        .text-steel { color: #9CA3AF; }
        .text-tees { color: #3B82F6; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-header">
        <div class="text-xs md:text-sm">SCORE: <span id="scoreText" class="text-parmo">0</span></div>
        <div class="text-xs md:text-sm">LIVES: <span id="livesText" class="text-boro">3</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay">
        <h1 class="text-2xl md:text-4xl mb-4 text-boro">TEESSIDE<br><span class="text-white">BREAKOUT</span></h1>
        <p class="text-[10px] md:text-xs text-steel max-w-md leading-relaxed mb-4">
            Defend the mighty Boro! Smash the Smog, Parmo, and Steel bricks.
        </p>
        <p class="text-[10px] md:text-xs text-gray-400 mb-8">
            [ Drag finger to move the steel beam ]
        </p>
        <button id="startBtn" class="btn">Play Game</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="text-3xl md:text-5xl mb-4 text-gray-400">ABSOLUTELY</h1>
        <h2 class="text-4xl md:text-6xl mb-4 text-boro">GUTTED.</h2>
        <p class="text-sm text-white mb-8">Final Score: <span id="finalScoreText" class="text-parmo">0</span></p>
        <button id="restartBtn" class="btn">Gis another go</button>
    </div>

    <!-- Victory Screen -->
    <div id="victoryScreen" class="overlay hidden">
        <h1 class="text-3xl md:text-5xl mb-4 text-parmo">GET IN!</h1>
        <h2 class="text-lg md:text-2xl mb-4 text-white">PROPER MINT JOB.</h2>
        <p class="text-sm text-white mb-8">You cleared the industrial estate!</p>
        <button id="nextLevelBtn" class="btn">Next Shift</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const scoreText = document.getElementById('scoreText');
    const livesText = document.getElementById('livesText');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const victoryScreen = document.getElementById('victoryScreen');
    const finalScoreText = document.getElementById('finalScoreText');

    // Game variables
    let animationId;
    let gameActive = false;
    let score = 0;
    let lives = 3;
    let level = 1;
    
    // Virtual resolution for scaling
    let logicalWidth, logicalHeight;
    let dpr = window.devicePixelRatio || 1;

    // Entities
    const paddle = {
        width: 0,
        height: 0,
        x: 0,
        y: 0,
        color: '#9CA3AF' // Steel
    };

    const ball = {
        x: 0,
        y: 0,
        radius: 0,
        dx: 0,
        dy: 0,
        speed: 0,
        baseSpeed: 0,
        color: '#DC2626' // Boro Red
    };

    const brickConfig = {
        rowCount: 5,
        columnCount: 6,
        width: 0,
        height: 0,
        padding: 0,
        offsetTop: 0,
        offsetLeft: 0,
        colors: [
            '#374151', // Row 1: Smog (Dark Gray)
            '#9CA3AF', // Row 2: Steel (Light Gray)
            '#3B82F6', // Row 3: Tees River (Blue)
            '#F59E0B', // Row 4: Parmo (Orange)
            '#DC2626'  // Row 5: Boro (Red)
        ]
    };

    let bricks = [];

    // Resize handling to ensure mobile friendliness
    function resizeCanvas() {
        logicalWidth = window.innerWidth;
        logicalHeight = window.innerHeight;
        
        canvas.width = logicalWidth * dpr;
        canvas.height = logicalHeight * dpr;
        
        ctx.scale(dpr, dpr);

        // Update Entity Dimensions based on screen size
        paddle.width = Math.min(logicalWidth * 0.25, 150); // Responsive width, max 150px
        paddle.height = Math.max(logicalHeight * 0.02, 15);
        paddle.y = logicalHeight - paddle.height - 40;
        
        if (!gameActive) {
            paddle.x = (logicalWidth - paddle.width) / 2;
        }

        ball.radius = Math.max(logicalWidth * 0.015, 6);
        ball.baseSpeed = logicalHeight * 0.007; // Scale speed with screen height

        brickConfig.padding = logicalWidth * 0.02;
        brickConfig.offsetTop = logicalHeight * 0.15;
        brickConfig.width = (logicalWidth - (brickConfig.columnCount + 1) * brickConfig.padding) / brickConfig.columnCount;
        brickConfig.height = Math.max(logicalHeight * 0.03, 15);
        brickConfig.offsetLeft = brickConfig.padding;

        if (!gameActive && bricks.length === 0) {
            initBricks();
        }
    }

    function initBricks() {
        bricks = [];
        for (let c = 0; c < brickConfig.columnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickConfig.rowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1, color: brickConfig.colors[r % brickConfig.colors.length] };
            }
        }
    }

    function resetBall() {
        ball.x = logicalWidth / 2;
        ball.y = paddle.y - ball.radius - 1;
        ball.speed = ball.baseSpeed + (level * 0.5);
        
        // Randomize initial angle slightly
        let angle = (Math.random() * (Math.PI / 3)) - (Math.PI / 6); // -30 to 30 degrees
        ball.dx = ball.speed * Math.sin(angle);
        ball.dy = -ball.speed * Math.cos(angle);
        
        paddle.x = (logicalWidth - paddle.width) / 2;
    }

    // Input Handling
    function handleTouchMove(e) {
        if (!gameActive) return;
        e.preventDefault();
        let touchX = e.touches[0].clientX;
        updatePaddlePos(touchX);
    }

    function handleMouseMove(e) {
        if (!gameActive) return;
        updatePaddlePos(e.clientX);
    }

    function updatePaddlePos(clientX) {
        let relativeX = clientX;
        if (relativeX > 0 && relativeX < logicalWidth) {
            paddle.x = relativeX - paddle.width / 2;
        }
        
        // Clamp to screen
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.width > logicalWidth) paddle.x = logicalWidth - paddle.width;
    }

    window.addEventListener('resize', () => {
        let wasActive = gameActive;
        gameActive = false; // Pause briefly
        resizeCanvas();
        if(wasActive) gameActive = true;
    });

    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('mousemove', handleMouseMove);

    // Drawing Functions
    function drawBackground() {
        // Draw sky
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, logicalWidth, logicalHeight);

        // Draw Transporter Bridge Silhouette
        ctx.fillStyle = 'rgba(31, 41, 55, 0.6)'; // Subtle dark gray
        
        let bridgeWidth = logicalWidth * 0.8;
        let startX = (logicalWidth - bridgeWidth) / 2;
        let towerWidth = bridgeWidth * 0.08;
        let towerHeight = logicalHeight * 0.6;
        let deckHeight = logicalHeight * 0.03;
        let deckY = logicalHeight - towerHeight + (towerHeight * 0.2);
        
        // Left Tower
        ctx.fillRect(startX, logicalHeight - towerHeight, towerWidth, towerHeight);
        // Right Tower
        ctx.fillRect(startX + bridgeWidth - towerWidth, logicalHeight - towerHeight, towerWidth, towerHeight);
        // Top Deck
        ctx.fillRect(startX, deckY, bridgeWidth, deckHeight);
        
        // Diagonal supports (simple representation)
        ctx.beginPath();
        ctx.moveTo(startX, deckY);
        ctx.lineTo(startX + towerWidth, logicalHeight);
        ctx.moveTo(startX + bridgeWidth, deckY);
        ctx.lineTo(startX + bridgeWidth - towerWidth, logicalHeight);
        ctx.strokeStyle = 'rgba(31, 41, 55, 0.6)';
        ctx.lineWidth = 4;
        ctx.stroke();

        // Gondola
        let gondolaWidth = towerWidth * 1.5;
        let gondolaHeight = deckHeight * 1.5;
        ctx.fillRect(logicalWidth/2 - gondolaWidth/2, deckY + deckHeight + 20, gondolaWidth, gondolaHeight);
        
        // Cables to gondola
        ctx.beginPath();
        ctx.moveTo(logicalWidth/2 - gondolaWidth/2, deckY + deckHeight + 20);
        ctx.lineTo(logicalWidth/2 - 10, deckY + deckHeight);
        ctx.moveTo(logicalWidth/2 + gondolaWidth/2, deckY + deckHeight + 20);
        ctx.lineTo(logicalWidth/2 + 10, deckY + deckHeight);
        ctx.stroke();
    }

    function drawPaddle() {
        ctx.fillStyle = paddle.color;
        
        // Steel beam look
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        
        // Highlights & shadows for 3D steel effect
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height * 0.2);
        
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(paddle.x, paddle.y + paddle.height * 0.8, paddle.width, paddle.height * 0.2);

        // Rivets
        ctx.fillStyle = '#4B5563';
        let numRivets = 5;
        for(let i=1; i<=numRivets; i++) {
            ctx.beginPath();
            ctx.arc(paddle.x + (paddle.width / (numRivets+1)) * i, paddle.y + paddle.height/2, paddle.height * 0.15, 0, Math.PI*2);
            ctx.fill();
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();
        
        // Inner highlight
        ctx.beginPath();
        ctx.arc(ball.x - ball.radius*0.3, ball.y - ball.radius*0.3, ball.radius*0.3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
        ctx.closePath();
    }

    function drawBricks() {
        for (let c = 0; c < brickConfig.columnCount; c++) {
            for (let r = 0; r < brickConfig.rowCount; r++) {
                if (bricks[c][r].status === 1) {
                    let brickX = (c * (brickConfig.width + brickConfig.padding)) + brickConfig.offsetLeft;
                    let brickY = (r * (brickConfig.height + brickConfig.padding)) + brickConfig.offsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    
                    ctx.fillStyle = bricks[c][r].color;
                    ctx.fillRect(brickX, brickY, brickConfig.width, brickConfig.height);
                    
                    // Shadow/Highlight for depth
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(brickX, brickY, brickConfig.width, brickConfig.height * 0.15);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(brickX, brickY + brickConfig.height * 0.85, brickConfig.width, brickConfig.height * 0.15);
                }
            }
        }
    }

    function collisionDetection() {
        let activeBricks = 0;
        
        for (let c = 0; c < brickConfig.columnCount; c++) {
            for (let r = 0; r < brickConfig.rowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    activeBricks++;
                    
                    // Find closest point on the rect to the circle center
                    let testX = ball.x;
                    let testY = ball.y;
                    
                    if (ball.x < b.x) testX = b.x;      // test left edge
                    else if (ball.x > b.x + brickConfig.width) testX = b.x + brickConfig.width;   // right edge
                    if (ball.y < b.y) testY = b.y;      // top edge
                    else if (ball.y > b.y + brickConfig.height) testY = b.y + brickConfig.height; // bottom edge
                    
                    let distX = ball.x - testX;
                    let distY = ball.y - testY;
                    let distance = Math.sqrt((distX*distX) + (distY*distY));
                    
                    if (distance <= ball.radius) {
                        b.status = 0;
                        score += (brickConfig.rowCount - r) * 10; // Higher bricks = more points
                        scoreText.innerText = score;
                        
                        // Increase speed slightly per hit
                        ball.speed = Math.min(ball.speed * 1.01, ball.baseSpeed * 2.5);
                        
                        // Determine reflection axis
                        if (Math.abs(distX) > Math.abs(distY)) {
                            ball.dx = -ball.dx;
                        } else {
                            ball.dy = -ball.dy;
                        }
                    }
                }
            }
        }
        
        if (activeBricks === 0) {
            winLevel();
        }
    }

    function update() {
        if (!gameActive) return;

        ball.x += ball.dx;
        ball.y += ball.dy;

        // Wall collisions
        if (ball.x + ball.radius > logicalWidth || ball.x - ball.radius < 0) {
            ball.dx = -ball.dx;
            // Push ball back in bounds
            ball.x = ball.x - ball.radius < 0 ? ball.radius : logicalWidth - ball.radius;
        }
        if (ball.y - ball.radius < 0) {
            ball.dy = -ball.dy;
            ball.y = ball.radius;
        } else if (ball.y + ball.radius > logicalHeight) {
            // Life lost
            lives--;
            livesText.innerText = lives;
            if (lives <= 0) {
                gameOver();
            } else {
                resetBall();
            }
        }

        // Paddle collision
        if (ball.dy > 0 && // Moving down
            ball.y + ball.radius > paddle.y && 
            ball.y - ball.radius < paddle.y + paddle.height &&
            ball.x + ball.radius > paddle.x && 
            ball.x - ball.radius < paddle.x + paddle.width) {
            
            // Calculate hit point relative to center of paddle
            let hitPoint = ball.x - (paddle.x + paddle.width / 2);
            // Normalize hit point (-1 to 1)
            let normalizedHit = hitPoint / (paddle.width / 2);
            
            // Calculate bounce angle (max 60 degrees from vertical)
            let bounceAngle = normalizedHit * (Math.PI / 3);
            
            ball.dx = ball.speed * Math.sin(bounceAngle);
            ball.dy = -ball.speed * Math.cos(bounceAngle);
            
            // Ensure ball is completely above paddle to prevent getting stuck
            ball.y = paddle.y - ball.radius;
        }

        collisionDetection();
    }

    function draw() {
        ctx.clearRect(0, 0, logicalWidth, logicalHeight);
        drawBackground();
        drawBricks();
        drawPaddle();
        drawBall();
    }

    function gameLoop() {
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
        initBricks();
        resetBall();
        score = 0;
        lives = 3;
        level = 1;
        scoreText.innerText = score;
        livesText.innerText = lives;
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        victoryScreen.classList.add('hidden');
        gameActive = true;
        
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameOver() {
        gameActive = false;
        finalScoreText.innerText = score;
        gameOverScreen.classList.remove('hidden');
    }

    function winLevel() {
        gameActive = false;
        level++;
        victoryScreen.classList.remove('hidden');
    }

    function continueGame() {
        initBricks();
        resetBall();
        victoryScreen.classList.add('hidden');
        gameActive = true;
    }

    // Button Listeners
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('nextLevelBtn').addEventListener('click', continueGame);

    // Init Setup
    resizeCanvas();
    drawBackground(); // Draw initial background behind start screen
    initBricks();
    drawBricks();
    drawPaddle();

</script>

</body>
</html>
