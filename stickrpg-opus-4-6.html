<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stick RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      touch-action: none;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 20;
      pointer-events: none;
    }

    .hud-panel {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      pointer-events: auto;
      line-height: 1.5;
    }

    .hud-panel .label {
      color: #aaa;
      font-weight: 400;
      font-size: 11px;
    }

    .stat-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 2px 0;
    }

    .stat-bar .bar-bg {
      width: 60px;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .stat-bar .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .str-fill { background: #e74c3c; }
    .int-fill { background: #3498db; }
    .cha-fill { background: #f39c12; }

    /* Mobile controls */
    #mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 20;
      display: grid;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px 56px;
      gap: 4px;
      opacity: 0.7;
    }

    .ctrl-btn {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: white;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:active {
      background: rgba(255,255,255,0.3);
    }

    .ctrl-up { grid-column: 2; grid-row: 1; }
    .ctrl-left { grid-column: 1; grid-row: 2; }
    .ctrl-right { grid-column: 3; grid-row: 2; }
    .ctrl-down { grid-column: 2; grid-row: 3; }

    #action-btn {
      position: fixed;
      bottom: 40px;
      right: 20px;
      z-index: 20;
      width: 72px;
      height: 72px;
      background: rgba(46, 204, 113, 0.7);
      backdrop-filter: blur(6px);
      border: 2px solid rgba(46, 204, 113, 0.9);
      border-radius: 50%;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    #action-btn:active {
      background: rgba(46, 204, 113, 0.95);
    }

    /* Dialog / Menu overlay */
    #dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #dialog-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    #dialog-box h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: #e94560;
    }

    #dialog-box p {
      font-size: 14px;
      margin-bottom: 16px;
      color: #ccc;
      line-height: 1.5;
    }

    .dialog-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dialog-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .dialog-btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-secondary {
      background: #0f3460;
      color: #ccc;
    }

    .btn-work {
      background: #2ecc71;
      color: white;
    }

    .btn-study {
      background: #3498db;
      color: white;
    }

    .btn-gym {
      background: #e74c3c;
      color: white;
    }

    .btn-charm {
      background: #f39c12;
      color: white;
    }

    .btn-gamble {
      background: #9b59b6;
      color: white;
    }

    .btn-sleep {
      background: #34495e;
      color: white;
    }

    .btn-close {
      background: rgba(255,255,255,0.1);
      color: #999;
    }

    /* Notification toast */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 60;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      text-align: center;
      max-width: 90%;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Day display */
    #day-display {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 6px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    @media (min-width: 768px) {
      #mobile-controls { display: none; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="hud">
    <div class="hud-panel" id="stats-panel">
      <div class="stat-bar">
        <span style="color:#e74c3c">💪</span>
        <div class="bar-bg"><div class="bar-fill str-fill" id="str-bar" style="width:5%"></div></div>
        <span id="str-val">5</span>
      </div>
      <div class="stat-bar">
        <span style="color:#3498db">🧠</span>
        <div class="bar-bg"><div class="bar-fill int-fill" id="int-bar" style="width:5%"></div></div>
        <span id="int-val">5</span>
      </div>
      <div class="stat-bar">
        <span style="color:#f39c12">✨</span>
        <div class="bar-bg"><div class="bar-fill cha-fill" id="cha-bar" style="width:5%"></div></div>
        <span id="cha-val">5</span>
      </div>
    </div>
    <div class="hud-panel" id="money-panel">
      💰 <span id="money-val">$100</span><br/>
      <span class="label">HP: </span><span id="hp-val">100</span>
    </div>
  </div>

  <div id="day-display">Day <span id="day-val">1</span> &mdash; <span id="time-val">Morning</span></div>

  <div id="mobile-controls">
    <button class="ctrl-btn ctrl-up" data-dir="up">▲</button>
    <button class="ctrl-btn ctrl-left" data-dir="left">◀</button>
    <button class="ctrl-btn ctrl-right" data-dir="right">▶</button>
    <button class="ctrl-btn ctrl-down" data-dir="down">▼</button>
  </div>

  <button id="action-btn">Enter</button>

  <div id="dialog-overlay">
    <div id="dialog-box">
      <h2 id="dialog-title">Location</h2>
      <p id="dialog-text">What would you like to do?</p>
      <div class="dialog-buttons" id="dialog-buttons"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game State
    const state = {
      day: 1,
      timeOfDay: 0, // 0=morning, 1=afternoon, 2=evening, 3=night
      money: 100,
      hp: 100,
      maxHp: 100,
      strength: 5,
      intelligence: 5,
      charm: 5,
      karma: 0,
      job: 'none', // none, mcsticks, janitor, programmer, ceo
      hasApartment: false,
      hasCar: false,
    };

    const timeLabels = ['Morning', 'Afternoon', 'Evening', 'Night'];

    // World / Camera
    const WORLD_W = 2400;
    const WORLD_H = 600;
    let cameraX = 0;

    // Player
    const player = {
      x: 200,
      y: 0,
      w: 20,
      h: 48,
      vx: 0,
      vy: 0,
      speed: 3,
      grounded: false,
      facing: 1,
      walkFrame: 0,
      nearBuilding: null,
    };

    const GRAVITY = 0.5;
    const GROUND_Y = WORLD_H - 80;

    // Buildings / Locations
    const buildings = [
      { x: 60,   w: 140, h: 120, name: 'Home',       color: '#2c3e50', roofColor: '#e74c3c', icon: '🏠', actions: ['sleep', 'rest'] },
      { x: 280,  w: 160, h: 100, name: 'McSticks',    color: '#e67e22', roofColor: '#d35400', icon: '🍔', actions: ['work_mcsticks'] },
      { x: 520,  w: 180, h: 140, name: 'University',  color: '#2980b9', roofColor: '#1a5276', icon: '🎓', actions: ['study'] },
      { x: 780,  w: 150, h: 110, name: 'Gym',         color: '#c0392b', roofColor: '#922b21', icon: '💪', actions: ['exercise'] },
      { x: 1010, w: 170, h: 130, name: 'Bar',         color: '#8e44ad', roofColor: '#6c3483', icon: '🍺', actions: ['socialize', 'gamble'] },
      { x: 1260, w: 160, h: 150, name: 'Corp Office', color: '#2c3e50', roofColor: '#1c2833', icon: '🏢', actions: ['work_office'] },
      { x: 1500, w: 140, h: 100, name: 'Shop',        color: '#27ae60', roofColor: '#1e8449', icon: '🛒', actions: ['shop'] },
      { x: 1720, w: 160, h: 120, name: 'Casino',      color: '#f1c40f', roofColor: '#d4ac0d', icon: '🎰', actions: ['gamble_big'] },
      { x: 1960, w: 180, h: 130, name: 'Hospital',    color: '#ecf0f1', roofColor: '#bdc3c7', icon: '🏥', actions: ['heal'] },
      { x: 2200, w: 140, h: 140, name: 'Penthouse',   color: '#1a1a2e', roofColor: '#e94560', icon: '🏰', actions: ['buy_apartment'] },
    ];

    // Set building y positions
    buildings.forEach(b => {
      b.y = GROUND_Y - b.h;
    });

    // Clouds
    const clouds = [];
    for (let i = 0; i < 12; i++) {
      clouds.push({
        x: Math.random() * WORLD_W,
        y: 30 + Math.random() * 100,
        w: 60 + Math.random() * 80,
        speed: 0.15 + Math.random() * 0.3,
      });
    }

    // NPCs (stick figures walking around)
    const npcs = [];
    for (let i = 0; i < 8; i++) {
      npcs.push({
        x: 100 + Math.random() * (WORLD_W - 200),
        facing: Math.random() > 0.5 ? 1 : -1,
        speed: 0.5 + Math.random() * 1,
        walkFrame: Math.random() * Math.PI * 2,
        color: ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#ecf0f1'][i],
      });
    }

    // Input
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    // Mobile controls
    const mobileDir = { up: false, down: false, left: false, right: false };
    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      const dir = btn.dataset.dir;
      btn.addEventListener('touchstart', e => { e.preventDefault(); mobileDir[dir] = true; }, { passive: false });
      btn.addEventListener('touchend', e => { e.preventDefault(); mobileDir[dir] = false; }, { passive: false });
      btn.addEventListener('mousedown', () => mobileDir[dir] = true);
      btn.addEventListener('mouseup', () => mobileDir[dir] = false);
    });

    // Action button
    const actionBtn = document.getElementById('action-btn');
    actionBtn.addEventListener('click', () => {
      if (player.nearBuilding) {
        openBuildingMenu(player.nearBuilding);
      }
    });

    // Keyboard enter
    window.addEventListener('keydown', e => {
      if (e.key === 'Enter' && player.nearBuilding && !dialogOpen) {
        openBuildingMenu(player.nearBuilding);
      }
    });

    // Dialog
    let dialogOpen = false;

    function openBuildingMenu(building) {
      dialogOpen = true;
      const overlay = document.getElementById('dialog-overlay');
      const title = document.getElementById('dialog-title');
      const text = document.getElementById('dialog-text');
      const btns = document.getElementById('dialog-buttons');

      title.textContent = building.icon + ' ' + building.name;
      btns.innerHTML = '';

      const actionMap = {
        sleep: { label: '😴 Sleep (Next Day)', cls: 'btn-sleep', fn: doSleep },
        rest: { label: '🛋️ Rest (+20 HP)', cls: 'btn-secondary', fn: doRest },
        work_mcsticks: { label: '🍔 Work Shift (+$' + getWorkPay('mcsticks') + ')', cls: 'btn-work', fn: () => doWork('mcsticks') },
        study: { label: '📚 Study (+Intelligence)', cls: 'btn-study', fn: doStudy },
        exercise: { label: '🏋️ Exercise (+Strength)', cls: 'btn-gym', fn: doExercise },
        socialize: { label: '💬 Socialize (+Charm)', cls: 'btn-charm', fn: doSocialize },
        gamble: { label: '🎲 Gamble ($50)', cls: 'btn-gamble', fn: () => doGamble(50) },
        work_office: { label: '💼 Work Office (+$' + getWorkPay('office') + ')', cls: 'btn-work', fn: () => doWork('office') },
        shop: { label: '🛒 Shop', cls: 'btn-secondary', fn: openShop },
        gamble_big: { label: '🎰 High Stakes ($200)', cls: 'btn-gamble', fn: () => doGamble(200) },
        heal: { label: '💊 Heal (Full HP, $50)', cls: 'btn-primary', fn: doHeal },
        buy_apartment: { label: '🏰 Buy Penthouse ($5000)', cls: 'btn-primary', fn: buyApartment },
      };

      let desc = getLocationDescription(building.name);
      text.textContent = desc;

      building.actions.forEach(action => {
        const info = actionMap[action];
        if (!info) return;
        const btn = document.createElement('button');
        btn.className = 'dialog-btn ' + info.cls;
        btn.textContent = info.label;
        btn.onclick = () => { info.fn(); };
        btns.appendChild(btn);
      });

      const closeBtn = document.createElement('button');
      closeBtn.className = 'dialog-btn btn-close';
      closeBtn.textContent = '✕ Leave';
      closeBtn.onclick = closeDialog;
      btns.appendChild(closeBtn);

      overlay.style.display = 'flex';
    }

    function getLocationDescription(name) {
      const descs = {
        'Home': 'Your humble starting home. Rest up or sleep to advance to the next day.',
        'McSticks': 'A fast food joint. Flip burgers for cash. No experience needed!',
        'University': 'Study hard to boost your Intelligence. Knowledge is power!',
        'Gym': 'Pump iron and build Strength. Feel the burn!',
        'Bar': 'Hang out, meet people, and raise your Charm. Maybe try your luck at dice.',
        'Corp Office': 'Corporate headquarters. Need Intelligence 30+ to work here.',
        'Shop': 'Buy useful items and upgrades.',
        'Casino': 'High stakes gambling. Big risk, big reward!',
        'Hospital': 'Patch yourself up. Full heal for $50.',
        'Penthouse': state.hasApartment ? 'Your luxurious penthouse! You made it!' : 'A premium penthouse. Yours for only $5,000.',
      };
      return descs[name] || '';
    }

    function closeDialog() {
      dialogOpen = false;
      document.getElementById('dialog-overlay').style.display = 'none';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function advanceTime() {
      state.timeOfDay++;
      if (state.timeOfDay >= 4) {
        state.timeOfDay = 0;
        state.day++;
      }
      updateHUD();
    }

    function getWorkPay(type) {
      if (type === 'mcsticks') return 15 + Math.floor(state.strength / 5);
      if (type === 'office') return 50 + Math.floor(state.intelligence / 3);
      return 10;
    }

    // --- Actions ---
    function doSleep() {
      state.timeOfDay = 0;
      state.day++;
      state.hp = Math.min(state.maxHp, state.hp + 30);
      showToast('💤 You slept. Day ' + state.day + ' begins!');
      closeDialog();
      updateHUD();
    }

    function doRest() {
      state.hp = Math.min(state.maxHp, state.hp + 20);
      showToast('🛋️ You rested. +20 HP');
      closeDialog();
      updateHUD();
    }

    function doWork(type) {
      if (type === 'office' && state.intelligence < 30) {
        showToast('❌ Need 30+ Intelligence to work here!');
        return;
      }
      const pay = getWorkPay(type);
      state.money += pay;
      state.hp -= 10;
      advanceTime();
      showToast('💼 Earned $' + pay + '!');
      closeDialog();
    }

    function doStudy() {
      state.intelligence += 2 + Math.floor(Math.random() * 2);
      state.hp -= 5;
      advanceTime();
      showToast('📚 Intelligence increased!');
      closeDialog();
    }

    function doExercise() {
      state.strength += 2 + Math.floor(Math.random() * 2);
      state.hp -= 8;
      advanceTime();
      showToast('💪 Strength increased!');
      closeDialog();
    }

    function doSocialize() {
      state.charm += 2 + Math.floor(Math.random() * 2);
      state.hp -= 3;
      advanceTime();
      showToast('✨ Charm increased!');
      closeDialog();
    }

    function doGamble(amount) {
      if (state.money < amount) {
        showToast('❌ Not enough money!');
        return;
      }
      state.money -= amount;
      const luck = Math.random();
      const charmBonus = state.charm / 200;
      if (luck + charmBonus > 0.55) {
        const winnings = amount * 2;
        state.money += winnings;
        showToast('🎉 You won $' + winnings + '!');
      } else {
        showToast('😢 You lost $' + amount + '...');
      }
      advanceTime();
      closeDialog();
    }

    function doHeal() {
      if (state.money < 50) {
        showToast('❌ Need $50 for healing!');
        return;
      }
      state.money -= 50;
      state.hp = state.maxHp;
      showToast('💊 Fully healed!');
      closeDialog();
      updateHUD();
    }

    function openShop() {
      const btns = document.getElementById('dialog-buttons');
      const title = document.getElementById('dialog-title');
      const text = document.getElementById('dialog-text');
      title.textContent = '🛒 Shop';
      text.textContent = 'Buy items to help your journey.';
      btns.innerHTML = '';

      const items = [
        { name: '☕ Energy Drink (+30 HP)', cost: 20, fn: () => { state.hp = Math.min(state.maxHp, state.hp + 30); showToast('☕ +30 HP!'); closeDialog(); updateHUD(); }},
        { name: '📖 Textbook (+5 INT)', cost: 100, fn: () => { state.intelligence += 5; showToast('📖 +5 Intelligence!'); closeDialog(); updateHUD(); }},
        { name: '👔 Nice Clothes (+5 CHA)', cost: 80, fn: () => { state.charm += 5; showToast('👔 +5 Charm!'); closeDialog(); updateHUD(); }},
        { name: '🏋️ Protein Shake (+5 STR)', cost: 60, fn: () => { state.strength += 5; showToast('🏋️ +5 Strength!'); closeDialog(); updateHUD(); }},
      ];

      items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'dialog-btn btn-secondary';
        btn.textContent = item.name + ' - $' + item.cost;
        btn.onclick = () => {
          if (state.money >= item.cost) {
            state.money -= item.cost;
            item.fn();
          } else {
            showToast('❌ Not enough money!');
          }
        };
        btns.appendChild(btn);
      });

      const closeBtn = document.createElement('button');
      closeBtn.className = 'dialog-btn btn-close';
      closeBtn.textContent = '✕ Leave Shop';
      closeBtn.onclick = closeDialog;
      btns.appendChild(closeBtn);
    }

    function buyApartment() {
      if (state.hasApartment) {
        showToast('🏰 You already own the penthouse!');
        closeDialog();
        return;
      }
      if (state.money < 5000) {
        showToast('❌ Need $5,000!');
        return;
      }
      state.money -= 5000;
      state.hasApartment = true;
      showToast('🎉 You bought the Penthouse! You win!');
      closeDialog();
      updateHUD();
    }

    // HUD update
    function updateHUD() {
      document.getElementById('str-val').textContent = state.strength;
      document.getElementById('int-val').textContent = state.intelligence;
      document.getElementById('cha-val').textContent = state.charm;
      document.getElementById('str-bar').style.width = Math.min(100, state.strength) + '%';
      document.getElementById('int-bar').style.width = Math.min(100, state.intelligence) + '%';
      document.getElementById('cha-bar').style.width = Math.min(100, state.charm) + '%';
      document.getElementById('money-val').textContent = '$' + state.money;
      document.getElementById('hp-val').textContent = Math.max(0, state.hp);
      document.getElementById('day-val').textContent = state.day;
      document.getElementById('time-val').textContent = timeLabels[state.timeOfDay];
    }

    // Drawing functions
    function getSkyColor() {
      const colors = [
        ['#87CEEB', '#E0F7FA'], // morning
        ['#5DADE2', '#AED6F1'], // afternoon
        ['#E67E22', '#F5CBA7'], // evening
        ['#1a1a2e', '#16213e'], // night
      ];
      return colors[state.timeOfDay];
    }

    function drawSky() {
      const [top, bottom] = getSkyColor();
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, top);
      grad.addColorStop(1, bottom);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Sun or moon
      if (state.timeOfDay === 3) {
        ctx.fillStyle = '#ecf0f1';
        ctx.beginPath();
        ctx.arc(W - 80, 60, 30, 0, Math.PI * 2);
        ctx.fill();
        // Moon craters
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath();
        ctx.arc(W - 90, 55, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(W - 72, 65, 4, 0, Math.PI * 2);
        ctx.fill();

        // Stars
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 50; i++) {
          const sx = (i * 137.5 + 42) % W;
          const sy = (i * 89.3 + 17) % (H * 0.4);
          ctx.fillRect(sx, sy, 1.5, 1.5);
        }
      } else {
        ctx.fillStyle = state.timeOfDay === 2 ? '#e74c3c' : '#f9ca24';
        ctx.beginPath();
        const sunX = state.timeOfDay === 0 ? W * 0.3 : state.timeOfDay === 1 ? W * 0.6 : W * 0.85;
        ctx.arc(sunX, state.timeOfDay === 2 ? H * 0.35 : 70, 35, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawClouds() {
      ctx.fillStyle = state.timeOfDay === 3 ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.7)';
      clouds.forEach(c => {
        const sx = c.x - cameraX;
        if (sx + c.w < -50 || sx > W + 50) return;
        ctx.beginPath();
        ctx.ellipse(sx, c.y, c.w / 2, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sx - c.w * 0.2, c.y - 8, c.w * 0.3, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sx + c.w * 0.25, c.y - 5, c.w * 0.25, 12, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawGround() {
      const gy = GROUND_Y - cameraY();
      // Grass
      ctx.fillStyle = state.timeOfDay === 3 ? '#1a3c1a' : '#2ecc71';
      ctx.fillRect(0, gy, W, H - gy);
      // Road
      ctx.fillStyle = '#444';
      ctx.fillRect(0, gy, W, 30);
      // Road lines
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 2;
      ctx.setLineDash([20, 15]);
      ctx.beginPath();
      ctx.moveTo(0, gy + 15);
      ctx.lineTo(W, gy + 15);
      ctx.stroke();
      ctx.setLineDash([]);
      // Sidewalk
      ctx.fillStyle = '#95a5a6';
      ctx.fillRect(0, gy + 30, W, 10);
    }

    function cameraY() {
      return 0;
    }

    function drawBuilding(b) {
      const sx = b.x - cameraX;
      const sy = b.y - cameraY();
      if (sx + b.w < -20 || sx > W + 20) return;

      // Building body
      ctx.fillStyle = b.color;
      ctx.fillRect(sx, sy, b.w, b.h);

      // Roof
      ctx.fillStyle = b.roofColor;
      ctx.beginPath();
      ctx.moveTo(sx - 10, sy);
      ctx.lineTo(sx + b.w / 2, sy - 25);
      ctx.lineTo(sx + b.w + 10, sy);
      ctx.closePath();
      ctx.fill();

      // Windows
      ctx.fillStyle = state.timeOfDay === 3 ? '#f9ca24' : '#AED6F1';
      const cols = Math.floor(b.w / 40);
      const rows = Math.floor(b.h / 40);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const wx = sx + 15 + c * 38;
          const wy = sy + 15 + r * 38;
          ctx.fillRect(wx, wy, 18, 18);
        }
      }

      // Door
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(sx + b.w / 2 - 10, sy + b.h - 35, 20, 35);
      ctx.fillStyle = '#f9ca24';
      ctx.beginPath();
      ctx.arc(sx + b.w / 2 + 5, sy + b.h - 16, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Icon & name
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.icon, sx + b.w / 2, sy - 30);

      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(b.name, sx + b.w / 2, sy - 42);

      // Highlight if near
      if (player.nearBuilding === b) {
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 2, sy - 2, b.w + 4, b.h + 4);
      }
    }

    function drawStickFigure(x, y, facing, frame, color, h) {
      const sx = x - cameraX;
      const sy = y - cameraY();
      h = h || 48;
      const headR = 7;
      const bodyLen = h * 0.4;
      const legLen = h * 0.35;
      const armLen = h * 0.25;

      ctx.strokeStyle = color || '#fff';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';

      // Head
      ctx.beginPath();
      ctx.arc(sx, sy - h + headR, headR, 0, Math.PI * 2);
      ctx.stroke();

      // Body
      const bodyTop = sy - h + headR * 2;
      const bodyBot = bodyTop + bodyLen;
      ctx.beginPath();
      ctx.moveTo(sx, bodyTop);
      ctx.lineTo(sx, bodyBot);
      ctx.stroke();

      // Legs with walking animation
      const legSwing = Math.sin(frame) * 20;
      ctx.beginPath();
      ctx.moveTo(sx, bodyBot);
      ctx.lineTo(sx - legSwing * facing * 0.5, bodyBot + legLen);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx, bodyBot);
      ctx.lineTo(sx + legSwing * facing * 0.5, bodyBot + legLen);
      ctx.stroke();

      // Arms
      const armSwing = Math.sin(frame) * 15;
      ctx.beginPath();
      ctx.moveTo(sx, bodyTop + bodyLen * 0.3);
      ctx.lineTo(sx + armSwing * facing * 0.5, bodyTop + bodyLen * 0.3 + armLen);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx, bodyTop + bodyLen * 0.3);
      ctx.lineTo(sx - armSwing * facing * 0.5, bodyTop + bodyLen * 0.3 + armLen);
      ctx.stroke();
    }

    function drawNPCs() {
      npcs.forEach(npc => {
        drawStickFigure(npc.x, GROUND_Y + 40, npc.facing, npc.walkFrame, npc.color, 40);
      });
    }

    // Update
    function update() {
      // Player movement
      let moving = false;
      if ((keys['ArrowLeft'] || keys['a'] || mobileDir.left) && !dialogOpen) {
        player.vx = -player.speed;
        player.facing = -1;
        moving = true;
      } else if ((keys['ArrowRight'] || keys['d'] || mobileDir.right) && !dialogOpen) {
        player.vx = player.speed;
        player.facing = 1;
        moving = true;
      } else {
        player.vx = 0;
      }

      if (moving) {
        player.walkFrame += 0.15;
      }

      // Apply velocity
      player.x += player.vx;
      player.x = Math.max(10, Math.min(WORLD_W - 10, player.x));

      // Camera follow
      const targetCam = player.x - W / 2;
      cameraX += (targetCam - cameraX) * 0.1;
      cameraX = Math.max(0, Math.min(WORLD_W - W, cameraX));

      // Check near building
      player.nearBuilding = null;
      buildings.forEach(b => {
        const px = player.x;
        if (px > b.x - 20 && px < b.x + b.w + 20) {
          player.nearBuilding = b;
        }
      });

      // Show/hide action button
      if (player.nearBuilding && !dialogOpen) {
        actionBtn.style.display = 'flex';
        actionBtn.textContent = player.nearBuilding.icon;
      } else {
        actionBtn.style.display = 'none';
      }

      // NPC movement
      npcs.forEach(npc => {
        npc.x += npc.speed * npc.facing;
        npc.walkFrame += 0.08;
        if (npc.x < 50 || npc.x > WORLD_W - 50) {
          npc.facing *= -1;
        }
      });

      // Cloud movement
      clouds.forEach(c => {
        c.x += c.speed;
        if (c.x > WORLD_W + 100) c.x = -100;
      });

      // HP check
      if (state.hp <= 0) {
        state.hp = state.maxHp;
        state.money = Math.max(0, state.money - 50);
        state.day++;
        state.timeOfDay = 0;
        showToast('💀 You passed out! Lost $50. New day...');
        updateHUD();
      }
    }

    // Render
    function render() {
      ctx.clearRect(0, 0, W, H);

      drawSky();
      drawClouds();

      // Background hills
      ctx.fillStyle = state.timeOfDay === 3 ? '#0d1117' : '#27ae60';
      for (let i = 0; i < 5; i++) {
        const hx = i * 500 - cameraX * 0.3;
        ctx.beginPath();
        ctx.ellipse(hx, GROUND_Y - cameraY() - 20, 250, 60, 0, Math.PI, 0);
        ctx.fill();
      }

      // Buildings
      buildings.forEach(drawBuilding);

      drawGround();

      // NPCs
      drawNPCs();

      // Player
      drawStickFigure(player.x, GROUND_Y + 40, player.facing, player.walkFrame, '#fff', 48);
    }

    // Game loop
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    updateHUD();
    gameLoop();
  </script>
</body>
</html>
